<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | 프로모션 일정 취합</title>
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #6e1212;
    --blue:    #c41e1e;
    --sky:     #e05252;
    --purple:  #1565c0;
    --accent:  #fdf2f2;
    --border:  #e8d4d4;
    --text:    #1f1818;
    --muted:   #806c6c;
    --success: #16a34a;
    --danger:  #dc2626;
    --warn:    #d97706;
    --bg:      #fdf8f8;
    --card:    #ffffff;
    --white:   #ffffff;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  header {
    background:var(--navy); padding:0 28px; display:flex; align-items:center;
    justify-content:space-between; height:60px; position:sticky; top:0; z-index:100;
    box-shadow:0 2px 12px rgba(0,0,0,0.18);
  }
  .logo { display:flex; align-items:center; gap:10px; color:white; font-size:15px; font-weight:700; }
  .logo img { width:32px; height:32px; object-fit:contain; }
  .header-nav { display:flex; align-items:center; gap:12px; }
  .header-nav a { color:rgba(255,255,255,0.7); text-decoration:none; font-size:13px; font-weight:500;
    padding:6px 14px; border-radius:6px; transition:all 0.2s; }
  .header-nav a:hover { background:rgba(255,255,255,0.12); color:white; }

  main { max-width:1300px; margin:0 auto; padding:32px 20px 80px; }

  /* LOGIN */
  .login-wrap { max-width:380px; margin:80px auto; background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:36px; box-shadow:0 4px 24px rgba(110,18,18,0.1); text-align:center; }
  .login-wrap h2 { font-size:18px; font-weight:700; color:var(--navy); margin-bottom:8px; }
  .login-wrap p  { font-size:13px; color:var(--muted); margin-bottom:24px; }
  .login-input { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:8px;
    font-family:'Noto Sans KR',sans-serif; font-size:14px; outline:none; margin-bottom:12px;
    transition:border-color 0.2s; }
  .login-input:focus { border-color:var(--sky); }

  /* BTN */
  .btn { padding:9px 18px; border-radius:8px; font-family:'Noto Sans KR',sans-serif; font-size:13px;
    font-weight:600; cursor:pointer; transition:all 0.18s; border:none; display:inline-flex;
    align-items:center; gap:6px; text-decoration:none; }
  .btn-primary { background:var(--blue); color:white; box-shadow:0 2px 8px rgba(196,30,30,0.25); }
  .btn-primary:hover { background:#a01515; }
  .btn-outline { background:white; color:var(--blue); border:1.5px solid var(--border); }
  .btn-outline:hover { border-color:var(--sky); background:var(--accent); }
  .btn-success { background:var(--success); color:white; }
  .btn-success:hover { background:#15803d; }
  .btn-warn { background:#f59e0b; color:white; }
  .btn-warn:hover { background:#d97706; }
  .btn-sm { padding:4px 10px; font-size:11px; border-radius:5px; }
  .btn:disabled { opacity:0.45; cursor:not-allowed; }

  /* TOOLBAR */
  .toolbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;
    gap:14px; margin-bottom:24px; }
  .toolbar-title { font-size:20px; font-weight:700; color:var(--navy); }
  .toolbar-right { display:flex; gap:10px; flex-wrap:wrap; }

  /* SECTION TABS */
  .section-tabs { display:flex; gap:6px; margin-bottom:20px; }
  .section-tab { padding:7px 20px; border-radius:20px; border:1.5px solid var(--border);
    background:white; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer;
    transition:all 0.15s; font-family:'Noto Sans KR',sans-serif; }
  .section-tab:hover { border-color:var(--sky); color:var(--text); }
  .section-tab.active { background:var(--navy); border-color:var(--navy); color:white; }

  /* STATS */
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:24px; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
  .stat-num { font-size:26px; font-weight:700; color:var(--blue); font-family:'DM Mono',monospace; line-height:1; }
  .stat-num.green { color:var(--success); }
  .stat-num.warn  { color:var(--warn); }
  .stat-label { font-size:12px; color:var(--muted); margin-top:4px; }

  /* FILTERS */
  .filters { background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:14px 20px; margin-bottom:20px; display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; }
  .filter-group { display:flex; flex-direction:column; gap:5px; }
  .filter-group label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; }
  .filter-group select, .filter-group input { padding:8px 12px; border:1.5px solid var(--border);
    border-radius:8px; font-family:'Noto Sans KR',sans-serif; font-size:13px; color:var(--text);
    background:var(--white); outline:none; min-width:120px; }

  /* TABLE */
  .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:14px;
    overflow:hidden; box-shadow:0 2px 12px rgba(110,18,18,0.06); overflow-x:auto; }
  table { width:100%; border-collapse:collapse; min-width:900px; }
  thead tr { background:linear-gradient(90deg,var(--navy) 0%,#8b1a1a 100%); }
  thead th { padding:12px 14px; font-size:12px; font-weight:700; color:white; text-align:left;
    white-space:nowrap; letter-spacing:0.3px; }
  tbody tr { border-bottom:1px solid var(--border); transition:background 0.12s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:#fff0f0; }
  tbody td { padding:11px 14px; font-size:13px; vertical-align:top; line-height:1.5; }
  .col-no { color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; width:36px; }
  .col-schedule { white-space:nowrap; font-weight:600; color:var(--blue); }
  .col-product  { font-weight:500; max-width:200px; }
  .col-note     { color:var(--muted); font-size:12px; max-width:200px; }
  .col-ts       { color:var(--muted); font-size:11px; white-space:nowrap; font-family:'DM Mono',monospace; }

  .tag { display:inline-block; font-size:11px; font-weight:600; padding:2px 8px; border-radius:4px; white-space:nowrap; }
  .tag-신제품  { background:#dbeafe; color:#1d4ed8; }
  .tag-리뉴얼  { background:#f3e8ff; color:#7e22ce; }
  .tag-프로모션 { background:#dcfce7; color:#15803d; }
  .tag-박람회  { background:#fff7ed; color:#c2410c; }
  .tag-기타    { background:#f3f4f6; color:#4b5563; }

  .approved-row { background:#f0fdf4 !important; }
  .approved-mark { color:var(--success); font-weight:700; font-size:14px; margin-right:3px; }
  .history-badge { display:inline-flex; align-items:center; gap:4px; background:#fef9c3; color:#92400e;
    border:1px solid #fde68a; border-radius:12px; padding:2px 8px; font-size:11px; font-weight:600;
    cursor:pointer; transition:all 0.15s; }
  .history-badge:hover { background:#fde68a; }
  .empty-row td { text-align:center; padding:48px; color:var(--muted); font-size:14px; }

  /* HISTORY MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:flex;
    align-items:center; justify-content:center; z-index:200; }
  .modal-overlay.hidden { display:none; }
  .modal-box { background:white; border-radius:16px; padding:28px; width:520px; max-width:92vw;
    max-height:80vh; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,0.2); }
  .modal-title { font-size:16px; font-weight:700; color:var(--navy); margin-bottom:16px; }
  .hist-item { border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:10px; }
  .hist-time { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; margin-bottom:8px; }
  .hist-change { display:flex; gap:8px; align-items:flex-start; font-size:12px; margin-bottom:4px; }
  .hist-field { font-weight:700; color:var(--navy); min-width:50px; }
  .hist-arrow { color:var(--muted); }
  .hist-old { color:var(--danger); text-decoration:line-through; }
  .hist-new { color:var(--success); font-weight:600; }
  .modal-btns { display:flex; justify-content:flex-end; margin-top:16px; }

  /* CONTENT */
  .content-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:20px; }
  .content-card-header { background:linear-gradient(90deg,#0d9488,#0f766e); padding:13px 20px; }
  .content-card-header h3 { color:white; font-size:14px; font-weight:600; }
  .content-form { padding:20px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .content-form .field { display:flex; flex-direction:column; gap:5px; }
  .content-form .field.full { grid-column:1/-1; }
  .content-form label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.3px; }
  .content-form input, .content-form select, .content-form textarea {
    width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px;
    font-family:'Noto Sans KR',sans-serif; font-size:13px; color:var(--text); outline:none;
    transition:border-color 0.2s; background:white; }
  .content-form input:focus, .content-form select:focus, .content-form textarea:focus { border-color:#0d9488; }
  .content-form textarea { resize:vertical; min-height:64px; line-height:1.5; }
  .teal-thead tr { background:linear-gradient(90deg,#0d9488,#0f766e) !important; }
  .content-color { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700;
    padding:2px 9px; border-radius:4px; white-space:nowrap; }

  /* TOAST */
  #toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px);
    padding:12px 28px; border-radius:10px; font-size:14px; font-weight:600; color:white;
    opacity:0; transition:all 0.3s; z-index:999; pointer-events:none; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast.success { background:var(--success); }
  #toast.error   { background:var(--danger); }

  /* ADMIN CALENDAR */
  .admin-cal-wrap { background:var(--card); border:1px solid var(--border); border-radius:14px;
    overflow:hidden; margin-top:20px; box-shadow:0 2px 12px rgba(13,148,136,0.08); }
  .admin-cal-header { background:linear-gradient(90deg,#0d9488,#0f766e); padding:14px 20px;
    display:flex; align-items:center; gap:10px; }
  .admin-cal-header h3 { color:white; font-size:14px; font-weight:600; margin-left:auto; }
  .admin-cal-nav-btn { background:rgba(255,255,255,0.2); border:none; color:white; font-size:18px;
    width:30px; height:30px; border-radius:6px; cursor:pointer; display:inline-flex;
    align-items:center; justify-content:center; font-family:sans-serif; }
  .admin-cal-nav-btn:hover { background:rgba(255,255,255,0.38); }
  .admin-cal-today-btn { background:rgba(255,255,255,0.2); border:none; color:white; font-size:11px;
    font-weight:700; padding:4px 10px; border-radius:6px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; }
  .admin-cal-today-btn:hover { background:rgba(255,255,255,0.38); }
  .admin-cal-month-label { color:white; font-size:15px; font-weight:700; min-width:110px; text-align:center; }
  .admin-cal-body { padding:16px; }
  .admin-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .admin-cal-dow { text-align:center; font-size:10px; font-weight:700; color:var(--muted);
    padding:5px 0; text-transform:uppercase; letter-spacing:0.3px; }
  .admin-cal-cell { min-height:68px; border-radius:6px; padding:5px; background:#fafafa;
    border:1px solid var(--border); display:flex; flex-direction:column; gap:2px; }
  .admin-cal-cell.is-today { background:#fff5f5; border-color:var(--sky); }
  .admin-cal-cell.other-month { background:#f3f4f6; opacity:0.55; }
  .admin-cal-day-num { font-size:11px; font-weight:600; color:var(--muted); margin-bottom:2px; }
  .admin-cal-event { font-size:10px; font-weight:600; padding:1px 5px; border-radius:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:default;
    color:white; line-height:1.5; }

  /* CONTENT EDIT MODAL */
  .cedit-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:flex;
    align-items:center; justify-content:center; z-index:300; }
  .cedit-overlay.hidden { display:none; }

  @media(max-width:768px) {
    html, body { overflow-x: hidden; }
    main { padding:14px 10px 60px; }
    header { padding:0 14px; }
    .logo { font-size:12px; gap:6px; }

    .toolbar { flex-direction:column; align-items:flex-start; gap:10px; }
    .toolbar-right { flex-wrap:wrap; gap:8px; }

    .section-tabs { flex-wrap:wrap; gap:4px; }
    .section-tab { padding:6px 14px; font-size:12px; }

    .stats { grid-template-columns:repeat(2,1fr); gap:8px; }
    .stat-card { padding:12px 10px; }
    .stat-num { font-size:22px; }

    .filters { flex-direction:column; gap:8px; align-items:stretch; }
    .filter-group select, .filter-group input { min-width:unset; width:100%; }

    .col-hide-mob { display:none !important; }
    .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    table { min-width:340px; font-size:12px; }
    thead th { padding:10px 8px; font-size:11px; }
    tbody td { padding:9px 8px; }
    .btn-sm { font-size:10px; padding:3px 7px; }

    /* 콘텐츠 섹션 */
    .content-form { grid-template-columns:1fr; }
    .content-form .field.full { grid-column:1; }

    /* 수정 모달 */
    .cedit-overlay .modal-box { width:95vw; padding:18px 14px; max-height:90vh; overflow-y:auto; }
    .cedit-overlay .content-form { grid-template-columns:1fr; }

    /* 관리자 캘린더 */
    .admin-cal-body { padding:10px 8px; }
    .admin-cal-cell { min-height:52px; padding:3px; }
    .admin-cal-event { font-size:9px; padding:1px 3px; }
    .admin-cal-dow { font-size:9px; }
    .admin-cal-month-label { font-size:13px; min-width:90px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="/" style="text-decoration:none">
    <img src="/static/favicon.ico" alt="빙그레">
    프로모션 일정 취합 — 관리자
  </a>
  <nav class="header-nav">
    <a href="/">← 메인 페이지</a>
  </nav>
</header>

<main>

  <!-- ── 로그인 섹션 ── -->
  <div class="login-wrap" id="loginSection">
    <h2>🔒 관리자 로그인</h2>
    <p>관리자 비밀번호를 입력하세요.</p>
    <input class="login-input" type="password" id="adminPw" placeholder="비밀번호"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">로그인</button>
  </div>

  <!-- ── 대시보드 (로그인 후 표시) ── -->
  <div id="dashboard" style="display:none">

    <div class="toolbar">
      <div class="toolbar-title">관리자 대시보드</div>
      <div class="toolbar-right">
        <button class="btn btn-outline" onclick="loadData()">↻ 새로고침</button>
        <a id="exportBtn" href="/export?section=promo" class="btn btn-primary">⬇ 엑셀 다운로드</a>
      </div>
    </div>

    <!-- 섹션 탭 -->
    <div class="section-tabs">
      <button class="section-tab active" id="tab-promo"   onclick="switchSection('promo')">📋 프로모션 일정</button>
      <button class="section-tab"        id="tab-tasting" onclick="switchSection('tasting')">🧪 신제품 체험단</button>
      <button class="section-tab"        id="tab-content" onclick="switchSection('content')">📅 콘텐츠 캘린더</button>
    </div>

    <!-- 통계 (promo/tasting) -->
    <div class="stats" id="statsArea"></div>

    <!-- 필터 (promo/tasting) -->
    <div class="filters" id="adminFilters">
      <div class="filter-group">
        <label>담당팀</label>
        <select id="filterTeam" onchange="applyFilter()">
          <option value="">전체</option>
          {% for t in teams %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
        </select>
      </div>
      <div class="filter-group">
        <label>승인 상태</label>
        <select id="filterApproved" onchange="applyFilter()">
          <option value="">전체</option>
          <option value="approved">승인됨</option>
          <option value="pending">미승인</option>
        </select>
      </div>
      <div class="filter-group">
        <label>수정 여부</label>
        <select id="filterEdited" onchange="applyFilter()">
          <option value="">전체</option>
          <option value="edited">수정됨</option>
          <option value="original">미수정</option>
        </select>
      </div>
      <div class="filter-group">
        <label>검색</label>
        <input type="text" id="filterSearch" placeholder="제품명 검색..." oninput="applyFilter()">
      </div>
      <button class="btn btn-outline" onclick="resetFilters()">초기화</button>
    </div>

    <!-- 테이블 (promo/tasting) -->
    <div class="table-wrap" id="adminTableWrap">
      <table>
        <thead>
          <tr>
            <th class="col-no col-hide-mob">#</th>
            <th>일정</th>
            <th>담당팀</th>
            <th class="col-hide-mob">담당자</th>
            <th>구분</th>
            <th>제품명 / 행사명</th>
            <th class="col-hide-mob">비고</th>
            <th class="col-hide-mob">제출시각</th>
            <th class="col-hide-mob">수정이력</th>
            <th>승인</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- 콘텐츠 캘린더 섹션 -->
    <div id="contentSection" style="display:none">
      <div class="content-card">
        <div class="content-card-header"><h3>콘텐츠 일정 등록</h3></div>
        <div class="content-form">
          <div class="field">
            <label>시작일 *</label>
            <input type="date" id="c-start" onclick="try{this.showPicker()}catch(e){}">
          </div>
          <div class="field">
            <label>마감일</label>
            <input type="date" id="c-end" onclick="try{this.showPicker()}catch(e){}">
          </div>
          <div class="field">
            <label>구분 *</label>
            <select id="c-category">
              <option value="">선택</option>
              {% for c in content_categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
            </select>
          </div>
          <div class="field">
            <label>제목 / 제품명 *</label>
            <input type="text" id="c-product" placeholder="예) 빵또아 SNS 릴스">
          </div>
          <div class="field full">
            <label>비고</label>
            <textarea id="c-note" placeholder="세부 내용, 플랫폼, 담당자 등"></textarea>
          </div>
          <div class="field full" style="margin-top:0">
            <button class="btn btn-success" style="align-self:flex-start" onclick="addContentEntry()">＋ 등록</button>
          </div>
        </div>
      </div>
      <div style="font-size:14px;font-weight:700;color:#0d9488;margin-bottom:12px">등록된 콘텐츠 일정</div>
      <div class="table-wrap">
        <table class="teal-table">
          <thead class="teal-thead"><tr>
            <th class="col-no col-hide-mob">#</th><th>일정</th><th>구분</th><th>제목 / 제품명</th><th class="col-hide-mob">비고</th><th class="col-hide-mob">등록일</th><th>수정/삭제</th>
          </tr></thead>
          <tbody id="contentTableBody">
            <tr class="empty-row"><td colspan="7">등록된 항목이 없습니다.</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 콘텐츠 캘린더 뷰 -->
      <div class="admin-cal-wrap" id="adminCalWrap" style="display:none">
        <div class="admin-cal-header">
          <button class="admin-cal-nav-btn" onclick="adminCalNav(-1)">‹</button>
          <span class="admin-cal-month-label" id="adminCalMonthLabel">—</span>
          <button class="admin-cal-nav-btn" onclick="adminCalNav(1)">›</button>
          <button class="admin-cal-today-btn" onclick="adminCalToday()">오늘</button>
          <h3>콘텐츠 캘린더</h3>
        </div>
        <div class="admin-cal-body">
          <div class="admin-cal-grid" id="adminCalGrid"></div>
        </div>
      </div>
    </div>

  </div><!-- /dashboard -->
</main>

<div id="toast"></div>

<!-- 콘텐츠 수정 모달 -->
<div class="cedit-overlay hidden" id="contentEditModal" onclick="if(event.target===this)closeContentEdit()">
  <div class="modal-box" style="width:560px">
    <div class="modal-title">✏️ 콘텐츠 일정 수정</div>
    <div class="content-form" style="padding:0;margin-bottom:16px">
      <div class="field">
        <label>시작일 *</label>
        <input type="date" id="ce-start" onclick="try{this.showPicker()}catch(e){}">
      </div>
      <div class="field">
        <label>마감일</label>
        <input type="date" id="ce-end" onclick="try{this.showPicker()}catch(e){}">
      </div>
      <div class="field">
        <label>구분 *</label>
        <select id="ce-category">
          {% for c in content_categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
        </select>
      </div>
      <div class="field">
        <label>제목 / 제품명 *</label>
        <input type="text" id="ce-product">
      </div>
      <div class="field full">
        <label>비고</label>
        <textarea id="ce-note" style="min-height:60px"></textarea>
      </div>
    </div>
    <input type="hidden" id="ce-id">
    <div class="modal-btns" style="gap:8px">
      <button class="btn btn-outline" onclick="closeContentEdit()">취소</button>
      <button class="btn btn-success" onclick="submitContentEdit()">저장</button>
    </div>
  </div>
</div>

<!-- 히스토리 모달 -->
<div class="modal-overlay hidden" id="histModal" onclick="if(event.target===this)closeHist()">
  <div class="modal-box">
    <div class="modal-title">📋 수정 히스토리</div>
    <div id="histContent"></div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeHist()">닫기</button>
    </div>
  </div>
</div>

<script>
const FIELD_LABELS = {
  team:'담당팀', name:'담당자', schedule:'일정',
  category:'구분', product:'제품명', note:'비고'
};

let allData     = [];
let curSection  = 'promo';
let contentData = [];
const _now = new Date();
let adminCalYear  = _now.getFullYear();
let adminCalMonth = _now.getMonth() + 1;

// ── 인증 ──────────────────────────────────────────────────
async function doLogin() {
  const pw  = document.getElementById('adminPw').value;
  const res = await fetch('/api/auth', {
    method: 'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({password: pw})
  });
  if (res.ok) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboard').style.display    = 'block';
    loadData();
  } else {
    showToast('비밀번호가 올바르지 않습니다.', 'error');
    document.getElementById('adminPw').select();
  }
}

// 이미 로그인된 경우 바로 대시보드 표시
(async () => {
  const r = await fetch('/api/check_admin');
  const j = await r.json();
  if (j.is_admin) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboard').style.display    = 'block';
    loadData();
  }
})();

// ── 섹션 전환 ─────────────────────────────────────────────
const CONTENT_COLORS_ADMIN = {
  '국내 인스타그램':'#e11d48','글로벌 인스타그램':'#f97316','국내 틱톡':'#7c3aed','글로벌 틱톡':'#0284c7','글로벌 유튜브':'#dc2626','신제품 체험단':'#059669'
};
function getContentColor(cat) { return CONTENT_COLORS_ADMIN[cat] || '#0d9488'; }

function switchSection(section) {
  curSection = section;
  const isContent = section === 'content';
  ['tab-promo','tab-tasting','tab-content'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id === 'tab-' + section);
  });
  document.getElementById('statsArea').style.display      = isContent ? 'none' : '';
  document.getElementById('adminFilters').style.display   = isContent ? 'none' : '';
  document.getElementById('adminTableWrap').style.display = isContent ? 'none' : '';
  document.getElementById('contentSection').style.display = isContent ? 'block' : 'none';
  document.getElementById('adminCalWrap').style.display   = 'none';
  document.getElementById('exportBtn').style.display      = isContent ? 'none' : '';
  if (isContent) {
    loadContentData();
  } else {
    document.getElementById('exportBtn').href = `/export?section=${section}`;
    resetFilters();
    loadData();
  }
}

// ── 데이터 로드 ───────────────────────────────────────────
async function loadData() {
  const res = await fetch(`/api/data?section=${curSection}`);
  allData   = await res.json();
  renderStats();
  applyFilter();
}

function renderStats() {
  const total    = allData.length;
  const approved = allData.filter(d => d.approved).length;
  const edited   = allData.filter(d => d.updated_at).length;
  document.getElementById('statsArea').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">총 항목</div></div>
    <div class="stat-card"><div class="stat-num green">${approved}</div><div class="stat-label">승인됨</div></div>
    <div class="stat-card"><div class="stat-num warn">${total - approved}</div><div class="stat-label">미승인</div></div>
    <div class="stat-card"><div class="stat-num">${edited}</div><div class="stat-label">수정됨</div></div>
  `;
}

// ── 필터 ─────────────────────────────────────────────────
function applyFilter() {
  const team     = document.getElementById('filterTeam').value;
  const approved = document.getElementById('filterApproved').value;
  const edited   = document.getElementById('filterEdited').value;
  const search   = document.getElementById('filterSearch').value.toLowerCase();

  const filtered = allData.filter(d => {
    if (team   && d.team !== team) return false;
    if (approved === 'approved' && !d.approved) return false;
    if (approved === 'pending'  &&  d.approved) return false;
    if (edited   === 'edited'   && !d.updated_at) return false;
    if (edited   === 'original' &&  d.updated_at) return false;
    if (search && !d.product.toLowerCase().includes(search) &&
        !(d.note||'').toLowerCase().includes(search)) return false;
    return true;
  });

  renderTable(filtered);
}

function resetFilters() {
  ['filterTeam','filterApproved','filterEdited','filterSearch'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
  });
  applyFilter();
}

// ── 테이블 렌더링 ─────────────────────────────────────────
function fmtSchedule(s) {
  if (!s) return '';
  return s.split('~').map(p => {
    p = p.trim();
    if (/^\d{4}-\d{2}$/.test(p)) {
      const [y, m] = p.split('-');
      return `${y}년 ${parseInt(m)}월 (미정)`;
    }
    return p;
  }).join(' ~ ');
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  if (!data.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="10">📭 해당하는 항목이 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map((d, i) => {
    const history  = parseHistory(d.update_history);
    const histBadge = history.length
      ? `<button class="history-badge" onclick="showHist('${d.id}')">✎ ${history.length}회</button>`
      : '<span style="color:var(--muted);font-size:12px">—</span>';
    const appBtn = d.approved
      ? `<button class="btn btn-sm btn-warn" onclick="toggleApprove('${d.id}',false)">승인취소</button>`
      : `<button class="btn btn-sm btn-success" onclick="toggleApprove('${d.id}',true)">승인</button>`;
    return `
      <tr class="${d.approved ? 'approved-row' : ''}">
        <td class="col-no col-hide-mob">${i+1}</td>
        <td class="col-schedule">${esc(fmtSchedule(d.schedule))}</td>
        <td>${esc(d.team)}</td>
        <td class="col-hide-mob">${esc(d.name)}</td>
        <td><span class="tag tag-${d.category}">${esc(d.category)}</span></td>
        <td class="col-product">${d.approved ? '<span class="approved-mark">✓</span>' : ''}${esc(d.product)}</td>
        <td class="col-note col-hide-mob">${esc(d.note||'')}</td>
        <td class="col-ts col-hide-mob">${esc(d.submitted_at||'')}</td>
        <td class="col-hide-mob">${histBadge}</td>
        <td>${appBtn}</td>
      </tr>`;
  }).join('');
}

// ── 승인 토글 ─────────────────────────────────────────────
async function toggleApprove(id, approve) {
  const res  = await fetch(`/api/approve/${id}`, {
    method: 'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action: approve ? 'approve' : 'unapprove'})
  });
  const data = await res.json();
  if (data.success) { showToast(approve ? '승인 완료!' : '승인 취소됨', 'success'); loadData(); }
  else showToast(data.message || '오류 발생', 'error');
}

// ── 히스토리 모달 ─────────────────────────────────────────
function parseHistory(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  try { return JSON.parse(raw); } catch { return []; }
}

function showHist(id) {
  const d = allData.find(x => x.id === id);
  if (!d) return;
  const history = parseHistory(d.update_history);
  if (!history.length) return;

  const html = history.map((h, i) => {
    const changeRows = Object.entries(h.changes || {}).map(([f, v]) => `
      <div class="hist-change">
        <span class="hist-field">${FIELD_LABELS[f] || f}</span>
        <span class="hist-arrow">→</span>
        <span class="hist-old">${esc(String(v.old||''))}</span>
        <span class="hist-arrow">▶</span>
        <span class="hist-new">${esc(String(v.new||''))}</span>
      </div>`).join('');
    return `
      <div class="hist-item">
        <div class="hist-time">수정 ${i+1}회 · ${esc(h.changed_at||'')}</div>
        ${changeRows}
      </div>`;
  }).join('');

  document.getElementById('histContent').innerHTML = html;
  document.getElementById('histModal').classList.remove('hidden');
}

function closeHist() {
  document.getElementById('histModal').classList.add('hidden');
}

// ── 콘텐츠 캘린더 관리 ────────────────────────────────────
async function loadContentData() {
  const res = await fetch('/api/data?section=content');
  contentData = await res.json();
  renderContentTable();
  document.getElementById('adminCalWrap').style.display = 'block';
  renderAdminCal();
}

async function addContentEntry() {
  const start    = document.getElementById('c-start').value;
  const end      = document.getElementById('c-end').value;
  const category = document.getElementById('c-category').value;
  const product  = document.getElementById('c-product').value.trim();
  const note     = document.getElementById('c-note').value.trim();
  if (!start) return showToast('시작일을 입력하세요.', 'error');
  if (!category) return showToast('구분을 선택하세요.', 'error');
  if (!product) return showToast('제목을 입력하세요.', 'error');
  const res  = await fetch('/api/content/add', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ start, end, category, product, note })
  });
  const data = await res.json();
  if (data.success) {
    showToast('등록 완료!', 'success');
    document.getElementById('c-start').value    = '';
    document.getElementById('c-end').value      = '';
    document.getElementById('c-category').value = '';
    document.getElementById('c-product').value  = '';
    document.getElementById('c-note').value     = '';
    loadContentData();
  } else { showToast(data.message || '등록 실패', 'error'); }
}

async function deleteContent(id) {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  const res  = await fetch(`/api/delete/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) { showToast('삭제되었습니다.', 'success'); loadContentData(); }
  else showToast(data.message || '삭제 실패', 'error');
}

function renderContentTable() {
  const tbody = document.getElementById('contentTableBody');
  if (!contentData.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="7">📭 등록된 항목이 없습니다.</td></tr>`;
    return;
  }
  const sorted = [...contentData].sort((a, b) => {
    const sa = a.schedule.split('~')[0], sb = b.schedule.split('~')[0];
    return sa < sb ? -1 : sa > sb ? 1 : 0;
  });
  tbody.innerHTML = sorted.map((d, i) => {
    const color = getContentColor(d.category);
    return `<tr>
      <td class="col-no col-hide-mob">${i+1}</td>
      <td class="col-schedule">${esc(fmtSchedule(d.schedule))}</td>
      <td><span class="content-color" style="background:${color}22;color:${color};border:1px solid ${color}55">${esc(d.category)}</span></td>
      <td class="col-product">${esc(d.product)}</td>
      <td class="col-note col-hide-mob">${esc(d.note||'')}</td>
      <td class="col-ts col-hide-mob">${esc(d.submitted_at||'')}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm btn-outline" style="border-color:#a7f3d0;color:#059669;margin-right:4px" onclick="openContentEdit('${d.id}')">수정</button>
        <button class="btn btn-sm btn-outline" style="border-color:#fca5a5;color:var(--danger)" onclick="deleteContent('${d.id}')">삭제</button>
      </td>
    </tr>`;
  }).join('');
}

// ── 콘텐츠 수정 모달 ──────────────────────────────────────
function openContentEdit(id) {
  const d = contentData.find(x => x.id === id);
  if (!d) return;
  const parts = (d.schedule || '').split('~');
  document.getElementById('ce-id').value       = id;
  document.getElementById('ce-start').value    = (parts[0] || '').trim();
  document.getElementById('ce-end').value      = (parts[1] || '').trim();
  document.getElementById('ce-category').value = d.category || '';
  document.getElementById('ce-product').value  = d.product  || '';
  document.getElementById('ce-note').value     = d.note     || '';
  document.getElementById('contentEditModal').classList.remove('hidden');
}

function closeContentEdit() {
  document.getElementById('contentEditModal').classList.add('hidden');
}

async function submitContentEdit() {
  const id       = document.getElementById('ce-id').value;
  const start    = document.getElementById('ce-start').value;
  const end      = document.getElementById('ce-end').value;
  const category = document.getElementById('ce-category').value;
  const product  = document.getElementById('ce-product').value.trim();
  const note     = document.getElementById('ce-note').value.trim();
  if (!start)    return showToast('시작일을 입력하세요.', 'error');
  if (!category) return showToast('구분을 선택하세요.', 'error');
  if (!product)  return showToast('제목을 입력하세요.', 'error');
  const schedule = end ? `${start}~${end}` : start;
  const res  = await fetch(`/api/update/${id}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ schedule, category, product, note })
  });
  const data = await res.json();
  if (data.success) {
    closeContentEdit();
    showToast('수정되었습니다.', 'success');
    loadContentData();
  } else showToast(data.message || '수정 실패', 'error');
}

// ── 관리자 콘텐츠 캘린더 ─────────────────────────────────
function adminCalNav(dir) {
  adminCalMonth += dir;
  if (adminCalMonth > 12) { adminCalMonth = 1; adminCalYear++; }
  if (adminCalMonth < 1)  { adminCalMonth = 12; adminCalYear--; }
  renderAdminCal();
}

function adminCalToday() {
  const n = new Date();
  adminCalYear = n.getFullYear(); adminCalMonth = n.getMonth() + 1;
  renderAdminCal();
}

function getAdminEventDays(entry, yr, mo) {
  const s     = entry.schedule || '';
  const parts = s.split('~');
  const startStr = parts[0].trim();
  const endStr   = parts[1] ? parts[1].trim() : startStr;

  function toDateStart(str) {
    if (/^\d{4}-\d{2}$/.test(str)) { const [y,m]=str.split('-'); return new Date(+y,+m-1,1); }
    return new Date(str + 'T00:00:00');
  }
  function toDateEnd(str) {
    if (/^\d{4}-\d{2}$/.test(str)) { const [y,m]=str.split('-'); return new Date(+y,+m,0); }
    return new Date(str + 'T23:59:59');
  }

  const sd = toDateStart(startStr);
  const ed = toDateEnd(endStr);
  const days = [];
  const dim  = new Date(yr, mo, 0).getDate();
  for (let day = 1; day <= dim; day++) {
    const d = new Date(yr, mo-1, day);
    if (d >= sd && d <= ed) days.push(day);
  }
  return days;
}

function renderAdminCal() {
  document.getElementById('adminCalMonthLabel').textContent = `${adminCalYear}년 ${adminCalMonth}월`;
  const grid  = document.getElementById('adminCalGrid');
  const today = new Date();
  const dows  = ['일','월','화','수','목','금','토'];

  let html = dows.map(d => `<div class="admin-cal-dow">${d}</div>`).join('');

  const firstDay   = new Date(adminCalYear, adminCalMonth-1, 1).getDay();
  const daysInMo   = new Date(adminCalYear, adminCalMonth,  0).getDate();
  const prevDaysIn = new Date(adminCalYear, adminCalMonth-1, 0).getDate();

  // 이벤트 맵 구성
  const evMap = {};
  contentData.forEach(entry => {
    getAdminEventDays(entry, adminCalYear, adminCalMonth).forEach(day => {
      (evMap[day] = evMap[day] || []).push(entry);
    });
  });

  // 이전 달 셀
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="admin-cal-cell other-month"><div class="admin-cal-day-num">${prevDaysIn - firstDay + i + 1}</div></div>`;
  }

  // 현재 달 셀
  for (let day = 1; day <= daysInMo; day++) {
    const isToday = today.getFullYear()===adminCalYear && today.getMonth()+1===adminCalMonth && today.getDate()===day;
    const events  = evMap[day] || [];
    const evHtml  = events.map(e => {
      const color = getContentColor(e.category);
      return `<div class="admin-cal-event" style="background:${color}" title="${esc(e.product)} (${esc(e.category)})">${esc(e.product)}</div>`;
    }).join('');
    html += `<div class="admin-cal-cell${isToday ? ' is-today' : ''}">
      <div class="admin-cal-day-num">${day}</div>${evHtml}
    </div>`;
  }

  // 다음 달 빈 셀
  const total = firstDay + daysInMo;
  const rem   = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= rem; i++) {
    html += `<div class="admin-cal-cell other-month"><div class="admin-cal-day-num">${i}</div></div>`;
  }

  grid.innerHTML = html;
}

// ── 유틸 ──────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${type}`;
  setTimeout(() => { t.className=''; }, 2800);
}
</script>
</body>
</html>
